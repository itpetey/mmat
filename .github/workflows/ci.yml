name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: mmat
          POSTGRES_PASSWORD: mmat
          POSTGRES_DB: mmat
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mmat"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MMAT_DB_URL: postgres://mmat:mmat@localhost:5432/mmat

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test
