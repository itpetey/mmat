# Address and port the HTTP server binds to.
bind_addr = "127.0.0.1:8080"

# Postgres connection string for the event store, memory store, and
# artefact store.  Required by the workbench binary; when unset in
# library/coordinator crates, SQLite fallback is used.
pg_dsn = "postgres://mmat:mmat@localhost:5432/mmat"

# Qdrant gRPC URL.  When unset, vector operations use a no-op backend.
qdrant_url = "http://localhost:6334"

# Qdrant collection name for vector storage.
qdrant_collection = "mmat"

# Dimensionality of stored vectors.
qdrant_vector_dimension = 64

# OpenCode Zen API key for LLM-powered roles.  When unset, roles fall
# back to deterministic (non-LLM) behaviour.
opencode_zen_api_key = "sk-..."

# Root directory under which all project directories reside.
project_root = "~/projects"
