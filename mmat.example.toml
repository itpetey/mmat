# General MMAT server settings.
[mmat]
# Address and port the HTTP server binds to.
bind_addr = "127.0.0.1:8080"
# Root directory under which all project repositories reside.
project_root = "~/projects"

# Postgres connection for event, memory, and artefact stores.
[postgres]
dsn = "postgres://mmat:mmat@localhost:5432/mmat"

# Qdrant vector search settings.
[qdrant]
url = "http://localhost:6334"
collection = "mmat"
vector_dimension = 64

# LLM provider settings for role-level LLM and workbench assistant streaming.
[llm]
api_key = "sk-..."
model = "gpt-5"
timeout_secs = 60
