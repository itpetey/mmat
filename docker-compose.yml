services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: mmat
      POSTGRES_PASSWORD: mmat
      POSTGRES_DB: mmat
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mmat"]
      interval: 5s
      timeout: 5s
      retries: 5

  workbench:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://mmat:mmat@postgres:5432/mmat
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
