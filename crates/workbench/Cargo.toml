[package]
name = "mmat-workbench"
version.workspace = true
edition.workspace = true
readme.workspace = true
repository.workspace = true
license-file.workspace = true

[dependencies]
axum = { workspace = true, features = ["form", "http1", "json", "tokio"] }
futures-util.workspace = true
mmat-coordinator = { path = "../coordinator" }
mmat-event-stream = { path = "../event-stream" }
mmat-memory = { path = "../memory" }
mmat-roles = { path = "../roles" }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true, features = ["std"] }
thiserror.workspace = true
tokio = { workspace = true, features = [
  "macros",
  "net",
  "rt-multi-thread",
  "signal",
  "sync",
  "time"
] }
tracing.workspace = true
tracing-subscriber = { workspace = true, features = ["fmt", "env-filter"] }
uuid = { workspace = true, features = ["v4"] }

[dev-dependencies]
reqwest = { workspace = true, features = ["json"] }
sqlx = { workspace = true, features = ["postgres", "runtime-tokio"] }
