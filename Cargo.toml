[package]
name = "mmat"
version = "0.1.0"
edition = "2024"
repository = "https://github.com/itpetey/mmat"
license = "MPL-2.0"

[[bin]]
path = "src/bin/web.rs"
name = "mmat"

[dependencies]
axum = { version = "0.8", features = ["http1", "tokio", "ws"] }
clap = { version = "4.6", features = ["derive", "help", "std", "usage"] }
dioxus = { version = "0.7", features = ["liveview", "server"] }
dioxus-liveview = { version = "0.7", features = ["axum"] }
futures = { version = "0.3", features = ["alloc", "std"] }
naaf-core = { path = "../../naaf/main/crates/core" }
naaf-knowledge = { path = "../../naaf/main/crates/knowledge" }
naaf-llm = { path = "../../naaf/main/crates/llm", features = [
  "openai",
  "web-search"
] }
naaf-persistence-fs = { path = "../../naaf/main/crates/persistence-fs" }
naaf-persistence-sqlite = { path = "../../naaf/main/crates/persistence-sqlite" }
naaf-process = { path = "../../naaf/main/crates/process" }
naaf-qdrant = { path = "../../naaf/main/crates/qdrant" }
naaf-workspace = { path = "../../naaf/main/crates/workspace" }
parking_lot = "0.12"
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0", features = ["std"] }
thiserror = "2.0"
tokio = { version = "1.52", features = [
  "macros",
  "net",
  "process",
  "rt-multi-thread",
  "signal",
  "sync",
  "time"
] }
tracing = { version = "0.1", features = ["std"] }
tracing-subscriber = { version = "0.3", features = ["fmt", "registry", "std"] }
uuid = { version = "1.23", features = ["serde", "v4"] }
walkdir = "2"
