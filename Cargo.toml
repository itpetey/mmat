[package]
name = "mmat"
version = "0.1.0"
edition = "2024"
repository = "https://github.com/itpetey/mmat"
license = "MPL-2.0"

[dependencies]
axum = { version = "0.8", default-features = false, features = ["ws", "tokio", "http1"] }
clap = { version = "4.6", default-features = false, features = ["derive", "help", "std", "usage"] }
futures = { version = "0.3", default-features = false, features = ["alloc", "std"] }
naaf-core = { path = "../naaf/main/crates/core" }
naaf-llm = { path = "../naaf/main/crates/llm", features = [
  "openai",
  "web-search"
] }
naaf-persistence-fs = { path = "../naaf/main/crates/persistence-fs" }
naaf-process = { path = "../naaf/main/crates/process" }
naaf-workspace = { path = "../naaf/main/crates/workspace" }
parking_lot = { version = "0.12", default-features = false }
serde = { version = "1.0", default-features = false, features = ["derive"] }
serde_json = { version = "1.0", default-features = false, features = ["std"] }
thiserror = { version = "2.0", default-features = false }
tokio = { version = "1.52", default-features = false, features = ["macros", "net", "process", "rt-multi-thread", "sync"] }
tracing = { version = "0.1", default-features = false, features = ["std"] }
tracing-subscriber = { version = "0.3", default-features = false, features = ["registry"] }
uuid = { version = "1.23", default-features = false, features = ["serde", "v4"] }
