[package]
name = "mmat"
version = "0.1.0"
edition = "2024"
repository = "https://github.com/itpetey/mmat"
license = "MPL-2.0"

[dependencies]
futures = { version = "0.3", default-features = false, features = ["alloc", "std"] }
naaf-core = { path = "../naaf/main/crates/core" }
naaf-llm = { path = "../naaf/main/crates/llm", features = [
  "openai",
  "web-search"
] }
naaf-process = { path = "../naaf/main/crates/process" }
naaf-tui = { path = "../naaf/main/crates/tui" }
serde = { version = "1.0", default-features = false, features = ["derive"] }
serde_json = { version = "1.0", default-features = false, features = ["std"] }
thiserror = { version = "2.0", default-features = false }
tokio = { version = "1.52", default-features = false, features = ["macros", "process", "rt-multi-thread", "sync"] }
tracing = { version = "0.1", default-features = false, features = ["std"] }
