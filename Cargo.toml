[workspace]
resolver = "3"
members = ["crates/coordinator", "crates/event-stream", "crates/llm", "crates/memory", "crates/process"]

[workspace.package]
edition = "2024"
version = "0.1.0"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
thiserror = "2"
tracing = "0.1"
uuid = { version = "1", features = ["serde", "v4"] }
async-trait = "0.1"
futures-util = "0.3"
parking_lot = "0.12"
reqwest = { version = "0.13", features = ["json", "default-tls", "stream"] }
rusqlite = { version = "0.39", features = ["bundled"] }
qdrant-client = "1.17"
chrono = { version = "0.4", features = ["serde"] }
tempfile = "3"
wiremock = "0.6"
