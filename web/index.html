<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>MMAT</title>
        <style>__MMAT_APP_STYLES__</style>
    </head>
    <body>
        <div id="main"></div>
        <script>
            (function () {
                var OriginalWebSocket = window.WebSocket;
                var activeSocket = null;
                var reconnectAttempts = 0;
                var banner = null;

                function showDisconnectBanner() {
                    if (banner) return;
                    banner = document.createElement('div');
                    banner.id = 'mmat-disconnect-banner';
                    banner.textContent = 'Connection lost. Please refresh the page.';
                    banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;padding:0.55rem;text-align:center;background:rgba(236,143,143,0.95);color:#fff;font-size:0.82rem;font-family:inherit;';
                    document.body.appendChild(banner);
                }

                function hideDisconnectBanner() {
                    if (banner) {
                        banner.remove();
                        banner = null;
                    }
                }

                window.WebSocket = function (url, protocols) {
                    var ws = protocols ? new OriginalWebSocket(url, protocols) : new OriginalWebSocket(url);
                    activeSocket = ws;

                    ws.addEventListener('open', function () {
                        hideDisconnectBanner();
                        reconnectAttempts = 0;
                    });

                    ws.addEventListener('close', function () {
                        if (activeSocket === ws) {
                            showDisconnectBanner();
                        }
                    });

                    ws.addEventListener('error', function () {
                        if (activeSocket === ws) {
                            showDisconnectBanner();
                        }
                    });

                    return ws;
                };
                window.WebSocket.prototype = OriginalWebSocket.prototype;
                window.WebSocket.CONNECTING = OriginalWebSocket.CONNECTING;
                window.WebSocket.OPEN = OriginalWebSocket.OPEN;
                window.WebSocket.CLOSING = OriginalWebSocket.CLOSING;
                window.WebSocket.CLOSED = OriginalWebSocket.CLOSED;
            })();
        </script>
        __MMAT_LIVEVIEW_GLUE__
        <script>
            document.addEventListener('input', function (e) {
                if (e.target.classList.contains('composer-textarea')) {
                    e.target.style.height = 'auto';
                    e.target.style.height = e.target.scrollHeight + 'px';
                }
            });

            (function () {
                function observeConversation() {
                    var container = document.querySelector('.domain-conversation');
                    if (!container) {
                        setTimeout(observeConversation, 200);
                        return;
                    }

                    function isNearBottom() {
                        return container.scrollHeight - container.scrollTop - container.clientHeight < 60;
                    }

                    function scrollToBottom() {
                        container.scrollTop = container.scrollHeight;
                    }

                    var userScrolledAway = false;

                    container.addEventListener('scroll', function () {
                        userScrolledAway = !isNearBottom();
                    });

                    var observer = new MutationObserver(function () {
                        if (!userScrolledAway) {
                            scrollToBottom();
                        }
                    });

                    observer.observe(container, { childList: true, subtree: true, characterData: true });
                    scrollToBottom();
                }

                observeConversation();
            })();
        </script>
    </body>
</html>
